name: Trivy Scan
on:
  push:
    branches:
      - '*'
jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Trivy
        uses: aquasecurity/trivy-action@master

        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          vuln-type: 'os,library'
          exit-code: 1
          ignore-unfixed: true
