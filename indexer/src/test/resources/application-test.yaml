# Client calling the Indexer API must provide this token in the Authorization header
# diff core / max value should not impact the run, this is just to verify this is correct
app:
  initialiseVocabsIndex: false
  geometry:
    # This value will affect the size of grid to divide a spatial extents which is used to calculate the
    # centroid point in the summaries, test case needs to change if you change this value
    gridLandSize: 10.0
    coastalPrecision: 0.03
  indexing:
    pool:
      core: 2
      max: 2
  http:
    authToken: sample-auth-token

elasticsearch:
  docker:
    elasticVersion: "8.19.10"
  index:
    name: sample-portal-records
  vocabs_index:
    name: "test-vocabs-index"
    enableRefreshDelay: "false"
  query:
    pageSize: 4
  acronyms:
    name: portal-acronyms-test
    manual:
      - "aa => aurora australis"
      # full name has a stopword ("of") - same rule as index time
      - "soop => ships of opportunity"
      # one acronym, two full names - "ams" must expand to both at search time
      - "ams => australian marine sciences"
      - "ams => antarctic meteorological service"

datadiscoveryai:
  host: http://localhost
  baseUrl: /api/v1/ml/
  apiKey: test-api-key
  internalAiHeaderSecret: test-internal-key

dataAccessService:
  server:
    healthCheck: false

logging:
  level:
    au.org.aodn.ardcvocabs.service: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # Reduce noise from Spring Boot test context bootstrap when @SpringBootTest
    # classes do not declare an explicit nested @Configuration or classes= attribute.
    org.springframework.test.context.support.AnnotationConfigContextLoaderUtils: WARN
    org.springframework.boot.test.context.SpringBootTestContextBootstrapper: WARN
