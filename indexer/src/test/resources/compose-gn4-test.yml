# start a test instance of gn4 and elastic search that required by gn4, it is better to debug this by
# first start this compose locally and make sure it works before you run it with the autotest. That makes
# your debug easier.
services:
  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.10
    environment:
      - ES_JAVA_OPTS=-Xms1g -Xmx2g
      - ELASTIC_PASSWORD=changeme
      - xpack.security.enabled=true
      - discovery.type=single-node
      # Suppress disk watermark checks for unstable local/test environments
      - cluster.routing.allocation.disk.threshold_enabled=false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.10
    # Run as root inside setup container to allow low-level network hooks if needed
    user: "0"
    depends_on:
      elastic:
        condition: service_healthy
    command: >
      bash -c '
        echo "Waiting for Elasticsearch API responsiveness...";
        until curl -s -u "elastic:changeme" http://elastic:9200/_cluster/health | grep -q -E "(yellow|green)"; do 
          echo "Waiting for cluster to be healthy..."; 
          sleep 5; 
        done;
        echo "Setting kibana_system password...";
        until curl -s -u "elastic:changeme" -H "Content-Type: application/json" -X POST http://elastic:9200/_security/user/kibana_system/_password -d "{\"password\":\"password\"}" | grep -q "^{}"; do 
          echo "Retrying password configuration...";
          sleep 5; 
        done;
        echo "All done";
      '

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.10
    environment:
      - ELASTICSEARCH_HOSTS=http://elastic:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=password
    depends_on:
      elastic:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  geonetwork:
    image: geonetwork:4.4.9
    depends_on:
      kibana:
        condition: service_healthy
    environment:
      GN_CONFIG_PROPERTIES: >-
        -Des.protocol=${ES_PROTOCOL:-http}
        -Des.host=${ES_HOST:-elastic}
        -Des.port=${ES_PORT:-9200}
        -Des.url=${ES_PROTOCOL:-http}://${ES_HOST:-elastic}:${ES_PORT:-9200}
        -Des.username=${ES_USERNAME:-elastic}
        -Des.password=${ES_PASSWORD:-changeme}
      KB_URL: ${KB_URL:-http://kibana:5601}
